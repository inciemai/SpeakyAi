<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Assistant</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-6">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-gray-800">Voice Assistant</h1>
                <p class="text-gray-600">Click the microphone to start speaking</p>
            </div>

            <div class="flex justify-center mb-6">
                <select id="languageSelect" class="block w-full max-w-xs px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <!-- Languages will be populated via JavaScript -->
                </select>
            </div>

            <div class="text-center mb-6">
                <button id="micButton" class="p-4 bg-blue-500 text-white rounded-full hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                    </svg>
                </button>
            </div>

            <div id="status" class="text-center mb-4 text-gray-600">
                Ready to listen...
            </div>

            <div id="result" class="bg-gray-50 p-4 rounded-lg mb-4 min-h-[100px] hidden">
                <div class="font-semibold mb-2">Last Conversation:</div>
                <div id="userText" class="text-gray-700 mb-2"></div>
                <div id="assistantText" class="text-blue-600"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/voice-assistant.js"></script>
</body>
</html>
