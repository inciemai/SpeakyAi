services:
  - type: web
    name: speakyai
    env: python
    buildCommand: |
      # Install system dependencies
      sudo apt-get update && sudo apt-get install -y portaudio19-dev ffmpeg libasound2-dev
      pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: RENDER
        value: "true" 