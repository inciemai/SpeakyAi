services:
  - type: web
    name: speakyai
    env: python
    buildCommand: |
      # Install system dependencies
      sudo apt-get update && sudo apt-get install -y \
        portaudio19-dev \
        ffmpeg \
        libasound2-dev \
        python3-dev \
        python3-pip \
        build-essential \
        swig \
        libpulse-dev
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: RENDER
        value: "true" 